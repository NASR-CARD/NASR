<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | NASR CARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top right, #1a0b2e 0%, #05010a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* أنيميشن الخلفية المتحركة */
        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(212, 175, 55, 0.05);
            filter: blur(80px);
            border-radius: 50%;
            z-index: 0;
            animation: float 15s infinite alternate;
        }

        @keyframes float {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 50px 35px;
            width: 90%;
            max-width: 420px;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            text-align: center;
        }

        .logo-box {
            width: 85px;
            height: 85px;
            background: linear-gradient(135deg, #f9d976 0%, #d4af37 100%);
            border-radius: 25px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(-5deg);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
        }

        .brand-name {
            font-size: 30px;
            font-weight: 900;
            color: #f9d976;
            margin-bottom: 5px;
            letter-spacing: -1px;
            font-style: italic;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-group i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #d4af37;
            font-size: 18px;
        }

        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 16px 55px 16px 15px;
            color: #fff;
            outline: none;
            transition: 0.3s ease;
            text-align: right;
            font-size: 14px;
        }

        .input-field:focus {
            border-color: #f9d976;
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 15px rgba(249, 217, 118, 0.1);
        }

        .btn-gold {
            background: linear-gradient(135deg, #f9d976 0%, #d4af37 100%);
            color: #000;
            font-weight: 900;
            padding: 18px;
            border-radius: 18px;
            width: 100%;
            border: none;
            cursor: pointer;
            font-size: 18px;
            margin-top: 20px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .btn-gold:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
        }

        .btn-google {
            background: #fff;
            color: #000;
            font-weight: 700;
            padding: 14px;
            border-radius: 18px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: rgba(255, 255, 255, 0.1);
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin: 0 15px;
        }

        .register-text {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }

        .register-text span {
            color: #f9d976;
            font-weight: bold;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="orb"></div>

    <div class="login-card">
        <div class="logo-box">
            <i class="fas fa-crown text-4xl text-black"></i>
        </div>
        
        <h1 class="brand-name">NASR CARD</h1>
        <p class="text-gray-500 text-xs mb-10 italic">The Legend of Digital Commerce</p>

        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="البريد الإلكتروني" class="input-field" required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="كلمة السر" class="input-field" required>
            </div>

            <button type="submit" class="btn-gold">دخول</button>
        </form>

        <div class="divider">أو عبر</div>

        <button id="googleBtn" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18">
            بواسطة حساب Google
        </button>

        <p class="register-text">
            ليس لديك حساب؟ 
            <span onclick="window.location.href='register.html'">إنشاء حساب ملكي</span>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        // إعدادات الـ Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyAzsg4K2-AFKQwtlGbr--EszuUzQRQeYD8",
            authDomain: "foforecharge.firebaseapp.com",
            projectId: "foforecharge",
            storageBucket: "foforecharge.firebasestorage.app",
            messagingSenderId: "23143293034",
            appId: "1:23143293034:web:2a5e4e1914a7a8c6776a13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // وظيفة تسجيل الدخول
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "dashboard.html";
            } catch (error) {
                alert("بيانات الدخول غير صحيحة أو الحساب غير موجود.");
            }
        };

        // تسجيل الدخول بجوجل
        document.getElementById('googleBtn').onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
                window.location.href = "dashboard.html";
            } catch (error) {
                alert("حدث خطأ أثناء الاتصال بجوجل.");
            }
        };
    </script>
</body>
</html>
