<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASR CARD | Elite Shipping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@400;700&display=swap');
        :root { --main-cyan: #00f2ff; --main-purple: #7000ff; }
        body { font-family: 'Cairo', sans-serif; background: #050505; color: white; overflow-x: hidden; }
        .cyber-card { background: rgba(15, 15, 25, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        .neon-text { text-shadow: 0 0 10px var(--main-cyan); }
        .neon-border { border: 1px solid var(--main-cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        .page { display: none; }
        .active-page { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        input { background: #1a1a2e !important; border: 1px solid #333 !important; color: white !important; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-10">

    <div id="loginPage" class="page active-page p-6 pt-16">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black italic tracking-tighter neon-text" style="font-family: 'Orbitron';">NASR CARD</h1>
            <p class="text-cyan-400 text-sm mt-2 tracking-widest uppercase">The Future of Gaming Recharge</p>
        </div>
        <div class="cyber-card p-8 shadow-2xl">
            <input id="loginEmail" type="email" placeholder="البريد الإلكتروني" class="w-full p-4 rounded-xl mb-4 outline-none focus:border-cyan-500 transition">
            <input id="loginPass" type="password" placeholder="كلمة المرور" class="w-full p-4 rounded-xl mb-6 outline-none focus:border-cyan-500 transition">
            <button onclick="handleLogin()" class="w-full bg-gradient-to-r from-cyan-600 to-purple-600 p-4 rounded-xl font-bold text-lg hover:scale-105 transition">دخول الأن</button>
            <p class="text-center mt-6 text-gray-400 text-sm">ليس لديك حساب؟ <span class="text-cyan-400 cursor-pointer" onclick="showPage('registerPage')">سجل هنا</span></p>
        </div>
    </div>

    <div id="registerPage" class="page p-6 pt-16">
        <h2 class="text-3xl font-bold mb-8 text-center text-purple-500">مستخدم جديد</h2>
        <div class="cyber-card p-8">
            <input id="regName" type="text" placeholder="الاسم المستعار" class="w-full p-4 rounded-xl mb-4 outline-none">
            <input id="regEmail" type="email" placeholder="البريد الإلكتروني" class="w-full p-4 rounded-xl mb-4 outline-none">
            <input id="regPass" type="password" placeholder="كلمة المرور" class="w-full p-4 rounded-xl mb-6 outline-none">
            <button onclick="handleRegister()" class="w-full bg-purple-600 p-4 rounded-xl font-bold transition">إنشاء حساب</button>
            <button onclick="showPage('loginPage')" class="w-full mt-4 text-gray-500 text-sm">لديك حساب؟ سجل دخول</button>
        </div>
    </div>

    <div id="dashboardPage" class="page p-6">
        <div class="flex justify-between items-center mb-8">
            <h3 id="userName" class="text-xl font-bold text-cyan-400 italic underline">..</h3>
            <button onclick="auth.signOut()" class="text-red-500 bg-red-500/10 p-2 rounded-lg"><i class="fas fa-power-off"></i></button>
        </div>

        <div class="cyber-card p-8 text-center mb-8 neon-border">
            <p class="text-xs text-gray-400 uppercase tracking-widest">Available Balance</p>
            <h1 class="text-5xl font-black my-2"><span id="userBalance">0</span> <span class="text-sm text-cyan-500">EGP</span></h1>
        </div>

        <button onclick="openOrderModal()" class="w-full cyber-card p-4 flex items-center mb-6 border-l-4 border-purple-600 hover:bg-purple-900/10 transition">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/17046974303423873739" class="w-16 h-16 rounded-2xl ml-4">
            <div class="text-right">
                <h3 class="text-xl font-bold text-purple-400">FOFO CHAT</h3>
                <p id="priceInfo" class="text-xs text-gray-400 italic">أقل طلب 100 ألف بـ 50 ج</p>
            </div>
            <i class="fas fa-bolt mr-auto text-yellow-500 animate-pulse"></i>
        </button>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="showPage('rechargePage')" class="cyber-card p-5 text-center"><i class="fas fa-wallet mb-2 text-green-500"></i><p>شحن محفظة</p></button>
            <button onclick="loadMyOrders()" class="cyber-card p-5 text-center"><i class="fas fa-tasks mb-2 text-blue-500"></i><p>طلباتي</p></button>
        </div>
    </div>

    <div id="adminPage" class="page p-6">
        <h2 class="text-2xl font-bold text-cyan-500 mb-6 italic"><i class="fas fa-user-shield ml-2"></i>لوحة الإدارة</h2>
        
        <div class="cyber-card p-6 mb-6">
            <h3 class="text-sm font-bold mb-4 text-yellow-500 italic uppercase underline">إعدادات الأسعار</h3>
            <div class="flex gap-2 mb-4">
                <input id="newPrice" type="number" placeholder="سعر الـ 100 ألف" class="flex-1 p-3 rounded-lg outline-none text-sm">
                <button onclick="updatePrice()" class="bg-yellow-600 px-4 rounded-lg text-sm font-bold">تحديث</button>
            </div>
        </div>

        <div class="cyber-card p-6">
            <h3 class="text-sm font-bold mb-4 text-green-500 italic uppercase underline">الطلبات الواردة</h3>
            <div id="adminOrders" class="space-y-4 text-xs">
                </div>
        </div>
    </div>

    <div id="orderModal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-50 hidden flex items-center justify-center p-6">
        <div class="cyber-card w-full p-8 relative border-t-4 border-purple-500">
            <button onclick="closeOrderModal()" class="absolute top-5 left-5 text-gray-400"><i class="fas fa-times"></i></button>
            <h2 class="text-xl font-bold mb-6 text-purple-400 italic">طلب كوينز FOFO</h2>
            <div class="space-y-4">
                <input id="fofoAmount" type="number" oninput="calculatePrice()" placeholder="الكمية (100000+)" class="w-full p-4 rounded-xl outline-none">
                <div class="flex items-center justify-between bg-slate-900 p-4 rounded-xl border border-slate-700">
                    <span class="text-xs text-gray-400">السعر المطلوب:</span>
                    <span id="fofoPrice" class="text-xl font-bold text-green-500">0 EGP</span>
                </div>
                <input id="fofoID" type="text" placeholder="ID حسابك في فوفو" class="w-full p-4 rounded-xl outline-none">
                <button onclick="confirmFofoOrder()" class="w-full bg-purple-600 p-4 rounded-xl font-black shadow-lg">تأكيد وخصم الرصيد</button>
            </div>
        </div>
    </div>

    <div id="rechargePage" class="page p-6">
        <button onclick="showPage('dashboardPage')" class="text-gray-500 mb-6 font-bold">← رجوع</button>
        <div class="cyber-card p-8 text-center">
            <i class="fab fa-whatsapp text-6xl text-green-500 mb-4"></i>
            <h2 class="text-xl font-bold mb-2">اشحن محفظتك</h2>
            <p class="text-gray-400 text-sm mb-6">حول لمبادلة رصيد Nasr Card عبر فودافون كاش</p>
            <div class="bg-slate-900 p-4 rounded-xl mb-6 font-mono text-cyan-400">01055936987</div>
            <button onclick="sendToWhatsApp()" class="w-full bg-green-600 p-4 rounded-xl font-bold">تحدث مع الإدارة لشحن رصيدك</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzsg4K2-AFKQwtlGbr--EszuUzQRQeYD8",
            authDomain: "foforecharge.firebaseapp.com",
            projectId: "foforecharge",
            storageBucket: "foforecharge.firebasestorage.app",
            messagingSenderId: "23143293034",
            appId: "1:23143293034:web:2a5e4e1914a7a8c6776a13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let globalPrice = 50; // السعر الافتراضي للـ 100 ألف

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
        };

        // تسجيل الدخول
        window.handleLogin = async () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            try { 
                await signInWithEmailAndPassword(auth, email, pass);
                if(email === "admin@nasr.com") showPage('adminPage');
            } catch (e) { alert("خطأ في البيانات"); }
        };

        // تسجيل حساب
        window.handleRegister = async () => {
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const name = document.getElementById('regName').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", res.user.uid), { name, balance: 0, email });
                alert("أهلاً بك في نصر كارد");
            } catch (e) { alert(e.message); }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                if(user.email === "admin@nasr.com") {
                    showPage('adminPage');
                    loadAdminData();
                } else {
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    document.getElementById('userName').innerText = docSnap.data().name;
                    document.getElementById('userBalance').innerText = docSnap.data().balance;
                    showPage('dashboardPage');
                }
            } else { showPage('loginPage'); }
        });

        // حاسبة الأسعار
        window.calculatePrice = () => {
            const amount = document.getElementById('fofoAmount').value;
            const totalPrice = (amount / 100000) * globalPrice;
            document.getElementById('fofoPrice').innerText = (amount >= 100000) ? totalPrice + " EGP" : "0 EGP";
        };

        window.openOrderModal = () => document.getElementById('orderModal').classList.remove('hidden');
        window.closeOrderModal = () => document.getElementById('orderModal').classList.add('hidden');

        // طلب الشحن وخصم الرصيد
        window.confirmFofoOrder = async () => {
            const amount = document.getElementById('fofoAmount').value;
            const id = document.getElementById('fofoID').value;
            const balance = parseInt(document.getElementById('userBalance').innerText);
            const cost = (amount / 100000) * globalPrice;

            if(amount < 100000 || !id) return alert("املا البيانات صح");
            if(balance < cost) return alert("رصيدك غير كافي");

            await addDoc(collection(db, "orders"), {
                uid: auth.currentUser.uid,
                email: auth.currentUser.email,
                amount,
                fofoID: id,
                cost,
                status: "قيد التنفيذ",
                date: new Date().toLocaleString('ar-EG')
            });
            
            // خصم الرصيد من الداتابيز
            const userRef = doc(db, "users", auth.currentUser.uid);
            await updateDoc(userRef, { balance: balance - cost });
            
            alert("تم خصم الرصيد وطلبك قيد التنفيذ يا بطل!");
            location.reload();
        };

        // أدمن: تحديث السعر
        window.updatePrice = () => {
            globalPrice = document.getElementById('newPrice').value;
            document.getElementById('priceInfo').innerText = `أقل طلب 100 ألف بـ ${globalPrice} ج`;
            alert("تم تحديث السعر في التطبيق");
        };

        // أدمن: تحميل الطلبات
        async function loadAdminData() {
            const q = query(collection(db, "orders"));
            const snap = await getDocs(q);
            let h = "";
            snap.forEach(d => {
                h += `<div class="p-3 bg-slate-800 rounded border-r-2 border-cyan-500">
                    <p>المستخدم: ${d.data().email}</p>
                    <p class="text-cyan-400">ID: ${d.data().fofoID} | كمية: ${d.data().amount}</p>
                    <p class="text-gray-500">${d.data().date}</p>
                </div>`;
            });
            document.getElementById('adminOrders').innerHTML = h || "لا توجد طلبات";
        }

        window.sendToWhatsApp = () => {
            const msg = `أهلاً نصر كارد، أريد شحن رصيد في محفظتي.%0Aإيميل حسابي: ${auth.currentUser.email}`;
            window.open(`https://wa.me/201055936987?text=${msg}`, '_blank');
        };
    </script>
</body>
</html>
