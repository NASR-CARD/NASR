<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة تحكم NASR CARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0a0a0a; color: #fff; overflow-x: hidden; }
        .gold-text { color: #f9d976; text-shadow: 0 0 10px rgba(249, 217, 118, 0.2); }
        .gold-bg { background: linear-gradient(135deg, #d4af37, #f9d976); }
        .admin-card { background: #161616; border: 1px solid #222; border-radius: 20px; transition: 0.3s; overflow: hidden; }
        .sidebar { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); z-index: 1000; }
        .sidebar.active { transform: translateX(0); }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.3s; color: #888; }
        .nav-link.active { background: #f9d976; color: #000; font-weight: bold; }
        .search-input { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 12px 40px 12px 15px; width: 100%; outline: none; color: white; }
        .glass-header { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #222; }
    </style>
</head>
<body id="adminBody" class="hidden">

    <div id="sidebar" class="sidebar fixed inset-y-0 right-0 w-72 bg-[#0f0f0f] p-6 border-l border-[#222] shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-2">
                <i class="fas fa-crown gold-text text-xl"></i>
                <h2 class="gold-text font-black text-xl italic">NASR CARD</h2>
            </div>
            <i onclick="toggleMenu()" class="fas fa-times text-gray-500 cursor-pointer p-2 bg-[#1a1a1a] rounded-full"></i>
        </div>
        <nav class="space-y-4">
            <div onclick="showSection('ordersSection')" class="nav-link active" id="btn-orders"><i class="fas fa-shopping-basket"></i> <span>الطلبات المستلمة</span></div>
            <div onclick="showSection('usersSection')" class="nav-link" id="btn-users"><i class="fas fa-users"></i> <span>إدارة المستخدمين</span></div>
            <div class="pt-6 border-t border-[#222]">
                <button onclick="signOutAdmin()" class="text-red-500 font-bold flex items-center gap-2 p-3 w-full"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
            </div>
        </nav>
    </div>

    <header class="glass-header p-4 flex justify-between items-center sticky top-0 z-50">
        <i onclick="toggleMenu()" class="fas fa-bars text-2xl gold-text cursor-pointer active:scale-90"></i>
        <h1 class="text-lg font-black italic gold-text tracking-tighter uppercase">Admin Panel</h1>
        <div class="w-9 h-9 gold-bg rounded-lg flex items-center justify-center text-black font-black shadow-lg">N</div>
    </header>

    <div class="p-4 max-w-4xl mx-auto">
        <div class="w-full h-32 gold-bg rounded-[2rem] flex flex-col items-center justify-center shadow-2xl mb-8 relative overflow-hidden">
            <h2 class="text-black text-3xl font-black italic z-10 tracking-tighter">لوحة الإدارة العليا</h2>
            <p class="text-black/60 font-bold text-[9px] z-10 tracking-[0.3em] uppercase">Control Everything</p>
            <i class="fas fa-user-shield absolute -right-4 -bottom-4 text-8xl text-black/10"></i>
        </div>

        <div id="ordersSection" class="section-content">
            <div class="flex justify-between items-center mb-6 px-2">
                <h3 class="font-black border-r-4 border-[#f9d976] pr-3 italic uppercase">New Orders</h3>
                <span id="orderCount" class="bg-[#1a1a1a] text-[10px] px-3 py-1 rounded-full text-gray-400">0 طلب</span>
            </div>
            <div id="ordersList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-center text-gray-600 col-span-full py-10">جاري جلب الطلبات الملكية...</p>
            </div>
        </div>

        <div id="usersSection" class="section-content hidden">
            <h3 class="font-black mb-4 border-r-4 border-blue-500 pr-3 italic uppercase">Users Database</h3>
            <div class="relative mb-6">
                <input type="text" id="userSearch" oninput="searchUsers()" placeholder="ابحث باسم المستخدم أو الـ ID..." class="search-input">
                <i class="fas fa-search absolute left-4 top-4 text-gray-600"></i>
            </div>
            <div id="usersList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzsg4K2-AFKQwtlGbr--EszuUzQRQeYD8",
            authDomain: "foforecharge.firebaseapp.com",
            projectId: "foforecharge",
            storageBucket: "foforecharge.firebasestorage.app",
            messagingSenderId: "23143293034",
            appId: "1:23143293034:web:2a5e4e1914a7a8c6776a13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // حماية الأدمن
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "admin@nasr.com") {
                document.getElementById('adminBody').classList.remove('hidden');
                loadOrders();
                loadUsers();
            } else {
                window.location.href = "index.html";
            }
        });

        // التبديل بين الأقسام
        window.showSection = (id) => {
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('btn-' + id.replace('Section', '')).classList.add('active');
            if(window.innerWidth < 768) toggleMenu();
        };

        // تحميل الطلبات
        function loadOrders() {
            onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc")), (snap) => {
                const list = document.getElementById('ordersList');
                document.getElementById('orderCount').innerText = snap.size + " طلب";
                list.innerHTML = snap.empty ? '<p class="text-center text-gray-500 col-span-full py-20">لا توجد طلبات حالياً</p>' : "";
                
                snap.forEach(d => {
                    const o = d.data();
                    let borderClass = "border-gold-text";
                    let statusText = "قيد الانتظار";
                    let statusColor = "text-yellow-500";

                    if(o.status === 'completed') { borderClass = "border-green-500"; statusText = "مكتمل ✅"; statusColor = "text-green-500"; }
                    if(o.status === 'rejected') { borderClass = "border-red-500"; statusText = "مرفوض ❌"; statusColor = "text-red-500"; }

                    list.innerHTML += `
                        <div class="admin-card p-5 border-l-4 ${borderClass} animate-pulse-once">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <p class="font-bold text-sm text-gray-100">${o.userName}</p>
                                    <p class="text-[9px] text-gray-600 font-mono tracking-tighter uppercase">${o.userId}</p>
                                </div>
                                <span class="text-[10px] font-black uppercase ${statusColor}">${statusText}</span>
                            </div>
                            <div class="bg-black/60 p-4 rounded-2xl border border-white/5 space-y-3 mb-5">
                                <div class="flex justify-between items-center"><span class="text-[10px] text-gray-500">ID المطلوب:</span><span class="text-blue-400 font-black select-all text-sm">${o.targetID}</span></div>
                                <div class="flex justify-between items-center"><span class="text-[10px] text-gray-500">الكمية:</span><span class="gold-text font-black">${Number(o.amount).toLocaleString()} كوين</span></div>
                                <div class="flex justify-between items-center border-t border-white/5 pt-2"><span class="text-[10px] text-gray-500">السعر المدفوع:</span><span class="text-white font-black">${o.price} EGP</span></div>
                            </div>
                            ${o.status === 'pending' ? `
                            <div class="flex gap-2">
                                <button onclick="handleOrder('${d.id}', 'completed')" class="flex-1 bg-green-600 text-black font-black py-3 rounded-xl text-[11px] active:scale-95 transition shadow-lg shadow-green-900/20">تم الشحن</button>
                                <button onclick="handleOrder('${d.id}', 'rejected', '${o.userId}', ${o.price})" class="flex-1 bg-red-600/10 text-red-500 border border-red-500/20 py-3 rounded-xl text-[11px] hover:bg-red-600/20 transition">رفض وإرجاع</button>
                            </div>` : ''}
                        </div>
                    `;
                });
            });
        }

        // معالجة الطلبات (قبول أو رفض مع إرجاع الرصيد)
        window.handleOrder = async (orderId, status, userId = null, price = 0) => {
            const confirmMsg = status === 'completed' ? "هل تم شحن الكوينز فعلاً؟" : "هل تريد رفض الطلب وإرجاع المبلغ للمستخدم؟";
            if(!confirm(confirmMsg)) return;

            try {
                // 1. تحديث حالة الطلب
                await updateDoc(doc(db, "orders", orderId), { status: status });

                // 2. إذا كان "رفض" -> إرجاع الرصيد للمستخدم
                if(status === 'rejected' && userId) {
                    // البحث عن وثيقة المستخدم في مجموعة users بناءً على الـ UID
                    // ملاحظة: هنا بنفترض أن الـ Document ID هو الـ UID
                    const userRef = doc(db, "users", userId);
                    await updateDoc(userRef, {
                        balance: increment(price)
                    });
                    alert("تم رفض الطلب وإرجاع " + price + " EGP لحساب المستخدم ✅");
                } else {
                    alert("تم تحديث حالة الطلب بنجاح ✅");
                }
            } catch (e) {
                console.error(e);
                alert("حدث خطأ في النظام!");
            }
        };

        // إدارة المستخدمين
        let allUsers = [];
        async function loadUsers() {
            onSnapshot(collection(db, "users"), (snap) => {
                allUsers = [];
                snap.forEach(d => allUsers.push({id: d.id, ...d.data()}));
                displayUsers(allUsers);
            });
        }

        function displayUsers(users) {
            const list = document.getElementById('usersList');
            list.innerHTML = "";
            users.forEach(u => {
                list.innerHTML += `
                    <div class="admin-card p-5 border-b-2 border-white/5">
                        <div class="flex justify-between items-center mb-4">
                            <div class="w-10 h-10 gold-bg rounded-xl flex items-center justify-center text-black font-black">${u.name.charAt(0)}</div>
                            <div class="text-right">
                                <p class="font-bold text-sm text-white">${u.name}</p>
                                <p class="text-[9px] text-gray-500 font-mono">${u.uid}</p>
                            </div>
                        </div>
                        <div class="flex justify-between items-center bg-black/40 p-3 rounded-xl mb-4">
                            <span class="text-[10px] text-gray-500 uppercase">Current Balance</span>
                            <span class="gold-text font-black text-lg">${u.balance} <span class="text-[8px]">EGP</span></span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="addBalance('${u.id}', '${u.name}')" class="flex-1 bg-white/5 hover:bg-[#f9d976]/10 hover:text-[#f9d976] text-white py-3 rounded-xl text-[11px] font-bold border border-white/5 transition">تعديل الرصيد</button>
                        </div>
                    </div>
                `;
            });
        }

        window.searchUsers = () => {
            const val = document.getElementById('userSearch').value.toLowerCase();
            const filtered = allUsers.filter(u => (u.name || "").toLowerCase().includes(val) || (u.uid || "").toLowerCase().includes(val));
            displayUsers(filtered);
        };

        window.addBalance = async (id, name) => {
            const amount = prompt("أدخل المبلغ المُراد إضافته لحساب " + name + " (استخدم علامة - للخصم):");
            if(amount && !isNaN(amount)) {
                await updateDoc(doc(db, "users", id), { balance: increment(Number(amount)) });
                alert("تم تحديث الرصيد بنجاح ✅");
            }
        };

        window.toggleMenu = () => document.getElementById('sidebar').classList.toggle('active');
        window.signOutAdmin = () => signOut(auth).then(() => window.location.href = "index.html");
    </script>
</body>
</html>
